# PR Validation
# Runs on every PR to main or develop. All checks must pass before merge.

name: PR Validation

on:
  pull_request:
    branches: [main, develop]

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install pytest mypy black ruff

      - name: Format check (black)
        run: black --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/ --strict

      - name: Lint (ruff)
        run: ruff check src/ tests/ --output-format=github

      - name: Tests
        run: pytest tests/ -xvs

        run: |
          Invoke-Pester -Path tests/ -Verbose -ErrorAction SilentlyContinue
