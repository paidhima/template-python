# PR Validation (Automatic)

Runs on every PR to validate changes against project standards.
Configure the language in: .github/workflows/pr-validate.yml

---

name: PR Validation

on:
  pull_request:
    branches: [main, develop]

jobs:
  # Detect language and run appropriate checks
  python-checks:
    if: contains(github.event.pull_request.title, '[python]') || contains(github.event.pull_request.files.*.path, 'pyproject.toml') || contains(github.event.pull_request.files.*.path, 'src/') && endsWith(github.event.pull_request.files.*.path, '.py')
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install pytest mypy black ruff
        continue-on-error: true
      
      - name: Format check (black)
        run: black --check src/ tests/ 2>/dev/null || true
      
      - name: Type check (mypy)
        run: mypy src/ --strict 2>/dev/null || true
      
      - name: Lint (ruff)
        run: ruff check src/ tests/ --output-format=github 2>/dev/null || true
      
      - name: Tests
        run: pytest tests/ -xvs 2>/dev/null || true
      
      - name: Comment with Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Validation complete. See job output above for details.'
            })

  powershell-checks:
    if: contains(github.event.pull_request.title, '[powershell]') || contains(github.event.pull_request.files.*.path, '.psd1') || contains(github.event.pull_request.files.*.path, '.psm1')
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tools
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -ErrorAction SilentlyContinue
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -ErrorAction SilentlyContinue
      
      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        continue-on-error: true
        run: |
          $Results = Invoke-ScriptAnalyzer -Path src/ -Recurse -ErrorAction SilentlyContinue
          if ($Results) { $Results }
      
      - name: Tests (Pester)
        shell: pwsh
        continue-on-error: true
        run: |
          Invoke-Pester -Path tests/ -Verbose -ErrorAction SilentlyContinue
