# Sync Copilot Instructions

Automatically syncs updated copilot-instructions from copilot-config to all linked projects.

Trigger: Runs automatically when files change in copilot-config/project-templates/ or copilot-config/global/

---

name: Sync Copilot Instructions from copilot-config

on:
  push:
    branches: [main]
    paths:
      - 'project-templates/*-copilot-instructions.md'
      - 'global/copilot-instructions.md'

jobs:
  sync-to-projects:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          repository: paidhima/copilot-config
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract changes
        id: extract
        run: |
          # Detect which template changed
          if git diff --name-only HEAD~1 | grep -q "python-copilot-instructions"; then
            echo "template_type=python" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD~1 | grep -q "powershell-copilot-instructions"; then
            echo "template_type=powershell" >> $GITHUB_OUTPUT
          fi
      
      - name: Log results
        run: |
          echo "Updated template: ${{ steps.extract.outputs.template_type }}"
          echo "Projects linked to this template should pull latest."
          echo "Manual sync: See linked projects for instructions."

  # Optional: Use repository_dispatch to notify projects
  notify-projects:
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Trigger sync in dependent projects
        run: |
          # This is a placeholder; in practice, you'd use gh CLI or API
          # to trigger workflow_dispatch in each linked project
          echo "📢 Copilot instructions updated!"
          echo "Linked projects should run 'scripts/sync-copilot-instructions.ps1'"
