# Validate (On-Demand)

This workflow validates your project against standards:
- Python: mypy strict, black, ruff, pytest
- PowerShell: PSScriptAnalyzer, Pester

Trigger: Click "Run workflow" on Actions tab in GitHub.

---

name: Validate Project (On-Demand)

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language: python or powershell'
        required: true
        default: 'python'
        type: choice
        options:
          - python
          - powershell

jobs:
  validate-python:
    if: github.event.inputs.language == 'python'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install pytest mypy black ruff
      
      - name: Format check (black)
        run: black --check src/ tests/ 2>/dev/null || echo "No src/tests found; skipping"
      
      - name: Type check (mypy)
        run: mypy src/ --strict 2>/dev/null || echo "No src found; skipping"
      
      - name: Lint (ruff)
        run: ruff check src/ tests/ 2>/dev/null || echo "No code found; skipping"
      
      - name: Tests (pytest)
        run: pytest tests/ -xvs 2>/dev/null || echo "No tests found; skipping"

  validate-powershell:
    if: github.event.inputs.language == 'powershell'
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tools
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -ErrorAction SilentlyContinue
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -ErrorAction SilentlyContinue
      
      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $Results = Invoke-ScriptAnalyzer -Path src/ -Recurse -ErrorAction SilentlyContinue
          if ($Results) { $Results; exit 1 }
      
      - name: Tests (Pester)
        shell: pwsh
        run: |
          Invoke-Pester -Path tests/ -Verbose -ErrorAction SilentlyContinue
